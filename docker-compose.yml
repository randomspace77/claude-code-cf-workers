services:
  claude-code-proxy:
    build: .
    ports:
      - "${HOST_PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      REASONING_CACHE_BACKEND: "${REASONING_CACHE_BACKEND:-memory}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles:
      - redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
